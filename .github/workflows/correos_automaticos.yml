name: Tracking Correos (Brevo → Monday)

on:
  schedule:
    - cron: '0 20 * * 2-6'  # 2 PM Monterrey (UTC-6) martes a sábado — 4h después del envío
  workflow_dispatch:

jobs:
  correos_automaticos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar correos_automaticos.py
        env:
          BREVO_API_KEY:            ${{ secrets.BREVO_API_KEY }}
          BREVO_TAG:                ${{ secrets.BREVO_TAG }}
          MONDAY_API_TOKEN:         ${{ secrets.MONDAY_API_TOKEN }}
          MONDAY_BOARD_ID:          ${{ secrets.MONDAY_BOARD_ID }}
          MONDAY_COLUMN_ID:         ${{ secrets.MONDAY_COLUMN_ID }}
          MONDAY_COLUMN_ID_ABIERTOS: ${{ secrets.MONDAY_COLUMN_ID_ABIERTOS }}
          SMTP_USER:                ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:            ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_TO:                ${{ secrets.NOTIFY_TO }}
        run: python correos_automaticos.py
